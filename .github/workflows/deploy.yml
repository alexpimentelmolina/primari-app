name: Deploy web to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      # Copia el output de Flutter a public/ (directorio no ignorado por .gitignore).
      # Necesario porque /build/ sí está en .gitignore y vercel deploy --prod
      # respeta .gitignore al empaquetar archivos para el upload.
      # Con outputDirectory:"public" en vercel.json, Vercel sirve desde aquí.
      - name: Copy build to public/
        run: |
          rm -rf public
          cp -r build/web/. public/

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project config
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Deploy to Vercel
        run: vercel deploy --prod --token=$VERCEL_TOKEN
