name: Deploy web to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      - name: Copy vercel.json to output
        run: cp vercel.json build/web/vercel.json

      - name: Deploy to Vercel
        run: cd build/web && npx vercel@latest --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: team_Z2I2SJMZypubeHhgEs4uyMAh
          VERCEL_PROJECT_ID: prj_WRbG0iqaw1YKwH8SxtKW2JhWeFdz
