workflows:

  # ─────────────────────────────────────────────────────────────────────────────
  # iOS · TestFlight
  # Activa en push a main. Sube automáticamente a TestFlight.
  # ─────────────────────────────────────────────────────────────────────────────
  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      # ── Signing ──────────────────────────────────────────────────────────
      # Codemagic carga el certificado "Primari Distribution" y el perfil
      # "primari_appstore_profile_new" desde Code Signing → iOS.
      # xcode-project use-profiles inyecta esas credenciales en el proyecto.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.primari.primariApp

      # ── Variables de entorno ──────────────────────────────────────────────
      # Define APP_STORE_CONNECT_* en:
      # Codemagic Dashboard → tu app → Environment variables (marcadas Secret)
      vars:
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      # 1. Dependencias Flutter
      - name: Flutter pub get
        script: flutter pub get

      # 2. Análisis estático (no bloquea el build)
      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos || true

      # 3. CocoaPods
      - name: Pod install
        script: |
          cd ios
          pod install --repo-update

      # 4. Inyectar certificado y perfil en el proyecto Xcode
      #    Genera /Users/builder/export_options.plist con la configuración
      #    correcta de firma para la exportación IPA.
      - name: Set up code signing
        script: xcode-project use-profiles

      # 5. Build IPA firmada
      - name: Flutter build IPA
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

      email:
        recipients:
          - alex@weareprimari.com
        notify:
          success: true
          failure: true
