workflows:

  # ─────────────────────────────────────────────────────────────────────────────
  # iOS · TestFlight
  # Activa en push a main. Sube automáticamente a TestFlight.
  # ─────────────────────────────────────────────────────────────────────────────
  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    # ── Integración con App Store Connect vía Team Settings ─────────────────
    integrations:
      app_store_connect: Codemagic

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      # ── Signing ──────────────────────────────────────────────────────────
      # Codemagic carga el certificado "Primari Distribution" y el perfil
      # "primari_appstore_profile_new" desde Code Signing → iOS.
      # xcode-project use-profiles inyecta esas credenciales en el proyecto.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.primari.primariApp

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      # 1. Dependencias Flutter
      - name: Flutter pub get
        script: flutter pub get

      # 2. Análisis estático (no bloquea el build)
      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos || true

      # 3. CocoaPods
      - name: Pod install
        script: |
          cd ios
          pod install --repo-update

      # 4. Inyectar certificado y perfil en el proyecto Xcode
      #    Genera /Users/builder/export_options.plist con la configuración
      #    correcta de firma para la exportación IPA.
      - name: Set up code signing
        script: xcode-project use-profiles

      # 5. Build IPA firmada
      # $BUILD_NUMBER es una variable de entorno automática de Codemagic que
      # incrementa en cada build del workflow. Esto evita el rechazo de Apple
      # por "duplicate build number" cuando se hacen varios pushes a main.
      - name: Flutter build IPA
        script: |
          flutter build ipa \
            --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

      email:
        recipients:
          - alex@weareprimari.com
        notify:
          success: true
          failure: true
